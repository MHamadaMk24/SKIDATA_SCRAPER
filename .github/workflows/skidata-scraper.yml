name: SKIDATA Scraper

on:
  schedule:
    # Test: every 10 min. (Requires PUBLIC repo on GitHub Free)
    - cron: "*/10 * * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
  repository_dispatch:
    # Allows external triggers (e.g. cron-job.org) via GitHub API
    types: [manual-trigger]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run SKIDATA pipeline
        env:
          HEADLESS: "true"
          SKIDATA_URL: ${{ secrets.SKIDATA_URL }}
          SKIDATA_TENANT: ${{ secrets.SKIDATA_TENANT }}
          SKIDATA_LOGIN: ${{ secrets.SKIDATA_LOGIN }}
          SKIDATA_PASSWORD: ${{ secrets.SKIDATA_PASSWORD }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SHAREPOINT_SITE_NAME: ${{ secrets.SHAREPOINT_SITE_NAME }}
          TARGET_FOLDER_PATH: ${{ secrets.TARGET_FOLDER_PATH }}
        run: python main.py
